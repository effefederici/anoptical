<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>t h e p a g e a s a n o p t i c a l i n s t r u m e n t</title>
<style>
  body {
    margin: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: monospace;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<canvas id="fogCanvas" width="700" height="700"></canvas>
<script>
const canvas = document.getElementById('fogCanvas');
const ctx = canvas.getContext('2d');

const width = canvas.width;
const height = canvas.height;

// Testo invisibile che genera il "vapore"
const text = `the book is only a sort of optical instrument which the writer offers to the reader`;
const textArray = text.split("100"); // QUI AGISCI BENE SULLA DENSITA DELLA MACCHIA TESTUALE

// Particelle che attraversano il campo
const numParticles = 500;
const particles = [];

class Particle {
    constructor() {
        this.reset();
    }
    reset() {
        this.x = Math.random() * width*0.05;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.9; // leggera deriva orizzontale
        this.vy = (Math.random() - 0.5) * 0.5; // movimento lento verticale
        this.size = 1 + Math.random() * 2;
        this.trace = [];
    }
    move() {
        this.x += this.vx;
        this.y += this.vy;

        // wrap-around
        if(this.x < 0) this.x = width;
        if(this.x > width) this.x = 0;
        if(this.y < 0) this.y = height;
        if(this.y > height) this.y = 0;

        // aggiunge la posizione attuale alla traccia
        this.trace.push({x: this.x, y: this.y});
        if(this.trace.length > 10) this.trace.shift();
    }
    draw() {
        // disegna la scia come striscia evanescente
        for(let i=0; i<this.trace.length; i++) {
            const p = this.trace[i];
            const alpha = i / this.trace.length * 0.5; // più vecchia = più trasparente
            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
            ctx.fillText(textArray[Math.floor(Math.random()*textArray.length)], p.x, p.y);
        }
    }
}

// inizializza particelle
for(let i=0; i<numParticles; i++) {
    particles.push(new Particle());
}

function draw() {
    // sfondo leggermente trasparente per effetto nebbia persistente
    ctx.fillStyle = "rgba(0,0,0,0.1)";
    ctx.fillRect(0, 0, width, height);

    ctx.font = "14px monospace";

    particles.forEach(p => {
        p.move();
        p.draw();
    });

    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
